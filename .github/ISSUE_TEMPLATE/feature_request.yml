name: Feature Request
description: Suggest a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's frustrating or missing?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
  - type: dropdown
    id: interface
    attributes:
      label: Where should this live?
      options:
        - CLI (raley)
        - MCP Server (raley-mcp)
        - Both
        - Not sure
